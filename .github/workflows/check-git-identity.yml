name: Check git identity

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check-identity:
    name: Block edstellarmarketing identity on non-owned repos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit author/committer identity
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.after }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -eu

          owner_lc=$(printf '%s' "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')

          # Resolve the commit range for this event. On the first push to a new
          # branch BASE_SHA is all-zeros, so fall back to just the head commit.
          if [ -z "${BASE_SHA:-}" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            range="$HEAD_SHA"
            log_args="-1"
          else
            range="$BASE_SHA..$HEAD_SHA"
            log_args=""
          fi

          echo "Checking commit identities in range: $range"

          violations=0
          while IFS='|' read -r sha an ae cn ce; do
            [ -z "$sha" ] && continue
            an_lc=$(printf '%s' "$an" | tr '[:upper:]' '[:lower:]')
            ae_lc=$(printf '%s' "$ae" | tr '[:upper:]' '[:lower:]')
            cn_lc=$(printf '%s' "$cn" | tr '[:upper:]' '[:lower:]')
            ce_lc=$(printf '%s' "$ce" | tr '[:upper:]' '[:lower:]')

            is_edstellar=0
            case "$an_lc$ae_lc$cn_lc$ce_lc" in
              *edstellarmarketing*) is_edstellar=1 ;;
            esac

            if [ "$is_edstellar" -eq 1 ] && [ "$owner_lc" != "edstellarmarketing" ]; then
              echo "::error::Commit $sha uses the 'edstellarmarketing' git identity (author='$an <$ae>', committer='$cn <$ce>') but repo owner is '$REPO_OWNER', not edstellarmarketing."
              violations=$((violations + 1))
            fi
          done <<EOF
          $(git log $log_args --format='%H|%an|%ae|%cn|%ce' $range)
          EOF

          if [ "$violations" -gt 0 ]; then
            echo ""
            echo "BLOCKED: $violations commit(s) used the edstellarmarketing identity in a repo not owned by edstellarmarketing."
            exit 1
          fi

          echo "OK: no disallowed edstellarmarketing commits found."
